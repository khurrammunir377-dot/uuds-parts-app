name: uuds_parts_app
description: UUDS Aircraft Parts Inspection App
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+9
  path_provider: ^2.1.2
  sqflite: ^2.3.2
  path: ^1.9.0
  intl: ^0.19.0
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  excel: ^4.0.6
  archive: ^3.6.1
  google_mlkit_text_recognition: ^0.13.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_main.png"
  adaptive_icon_background: "#0B3D91"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
